<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hey Auto — Driver Console</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #FF6B00;
      --primary-light: #FFF3E8;
      --green: #10B981;
      --green-light: #D1FAE5;
      --red: #EF4444;
      --red-light: #FEE2E2;
      --blue: #3B82F6;
      --text: #1A1A2E;
      --text2: #6B7280;
      --text3: #9CA3AF;
      --bg: #F7F8FA;
      --card: #FFFFFF;
      --border: #E5E7EB;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header h1 { font-size: 20px; color: var(--primary); } .header h1 span { color: var(--text); font-weight: 400; }
    .status-badge { display: flex; align-items: center; gap: 8px; padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; }
    .status-online { background: var(--green-light); color: var(--green); }
    .status-offline { background: var(--red-light); color: var(--red); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-online .status-dot { background: var(--green); }
    .status-offline .status-dot { background: var(--red); }
    .container { max-width: 900px; margin: 0 auto; padding: 24px; }
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
    .login-card { background: var(--card); border-radius: 16px; padding: 48px; width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; }
    .login-card .logo { font-size: 48px; margin-bottom: 16px; }
    .login-card h2 { font-size: 24px; margin-bottom: 4px; }
    .login-card p { color: var(--text2); margin-bottom: 32px; }
    .form-group { margin-bottom: 16px; text-align: left; }
    .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--text2); }
    .form-group input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 16px; outline: none; }
    .form-group input:focus { border-color: var(--primary); }
    .phone-input { display: flex; gap: 8px; }
    .phone-prefix { padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 12px; background: var(--bg); font-weight: 600; font-size: 16px; }
    .btn { padding: 14px 24px; border-radius: 12px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #D45A00; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-green { background: var(--green); color: white; }
    .btn-green:hover { background: #059669; }
    .btn-red { background: var(--red); color: white; }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
    .btn-outline:hover { background: var(--bg); }
    .btn-sm { padding: 10px 16px; font-size: 14px; width: auto; }
    .otp-inputs { display: flex; gap: 8px; justify-content: center; margin: 24px 0; }
    .otp-inputs input { width: 48px; height: 56px; text-align: center; font-size: 22px; font-weight: 700; border: 1.5px solid var(--border); border-radius: 12px; outline: none; }
    .otp-inputs input:focus { border-color: var(--primary); }
    .dashboard-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--card); border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .stat-value { font-size: 32px; font-weight: 800; color: var(--green); }
    .stat-label { font-size: 13px; color: var(--text2); margin-top: 4px; }
    .toggle-section { text-align: center; margin-bottom: 32px; }
    .toggle-btn { padding: 20px 48px; border-radius: 16px; font-size: 18px; font-weight: 700; border: none; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
    .toggle-btn:disabled { opacity: 0.5; cursor: wait; }
    .toggle-online { background: var(--red); color: white; }
    .toggle-offline { background: var(--primary); color: white; }
    .waiting-text { color: var(--text3); margin-top: 16px; font-size: 15px; }
    .ride-request { background: var(--card); border-radius: 16px; padding: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.12); border-left: 4px solid var(--primary); animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .request-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .request-title { font-size: 18px; font-weight: 700; }
    .request-timer { background: var(--primary-light); color: var(--primary); padding: 4px 12px; border-radius: 20px; font-weight: 700; font-size: 14px; }
    .request-fare { font-size: 36px; font-weight: 800; color: var(--primary); margin: 8px 0; }
    .request-meta { display: flex; gap: 16px; color: var(--text2); font-size: 14px; margin-bottom: 16px; }
    .route-section { background: var(--bg); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .route-point { display: flex; gap: 12px; align-items: flex-start; padding: 4px 0; }
    .route-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .route-line { width: 2px; height: 16px; background: var(--border); margin-left: 4px; }
    .route-label { font-size: 12px; color: var(--text3); font-weight: 600; }
    .route-addr { font-size: 15px; color: var(--text); }
    .request-actions { display: flex; gap: 12px; }
    .request-actions .btn { flex: 1; }
    .ride-phase { background: var(--card); border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .phase-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .phase-sub { color: var(--text2); margin-bottom: 16px; }
    .rider-card { display: flex; align-items: center; gap: 12px; background: var(--bg); border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; }
    .rider-avatar { width: 44px; height: 44px; border-radius: 22px; background: var(--green-light); display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .rider-name { font-weight: 600; }
    .rider-rating { display: flex; align-items: center; gap: 4px; font-size: 13px; color: var(--text2); }
    .otp-display { background: var(--green-light); border-radius: 12px; padding: 20px; text-align: center; margin: 16px 0; }
    .otp-display .label { font-size: 13px; color: var(--text2); }
    .otp-display .code { font-size: 32px; font-weight: 800; color: var(--green); letter-spacing: 8px; }
    .otp-verify { display: flex; gap: 8px; margin-bottom: 16px; }
    .otp-verify input { flex: 1; padding: 14px; font-size: 20px; text-align: center; letter-spacing: 8px; border: 2px solid var(--border); border-radius: 12px; font-weight: 700; }
    .completed-card { text-align: center; padding: 24px 0; }
    .completed-fare { font-size: 48px; font-weight: 800; color: var(--green); }
    .completed-label { color: var(--text2); margin-top: 4px; }
    .error-msg { background: var(--red-light); color: var(--red); padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-top: 12px; display: none; }
    .log-section { margin-top: 32px; }
    .log-section h3 { font-size: 16px; margin-bottom: 12px; color: var(--text2); }
    .log-entry { padding: 8px 12px; font-size: 13px; font-family: 'SF Mono', monospace; background: var(--card); border-radius: 6px; margin-bottom: 4px; border-left: 3px solid var(--border); color: var(--text2); }
    .log-entry.success { border-left-color: var(--green); }
    .log-entry.info { border-left-color: var(--blue); }
    .log-entry.warning { border-left-color: #F59E0B; }
    .log-entry.error { border-left-color: var(--red); }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span style="font-size:24px">🛺</span>
    <h1>Hey Auto <span>Driver Console</span></h1>
  </div>
  <div id="statusBadge" class="status-badge status-offline hidden">
    <span class="status-dot"></span>
    <span id="statusText">Offline</span>
  </div>
</div>

<!-- LOGIN -->
<div id="loginScreen" class="container login-screen">
  <div class="login-card">
    <div class="logo">🛺</div>
    <h2>Driver Console</h2>
    <p>Taliparamba, Kannur District</p>
    <div id="phoneStep">
      <div class="form-group">
        <label>Phone Number</label>
        <div class="phone-input">
          <span class="phone-prefix">+91</span>
          <input type="tel" id="phoneInput" placeholder="9876543211" maxlength="10" value="9876543211">
        </div>
      </div>
      <button class="btn btn-primary" id="sendOtpBtn" onclick="sendOtp()">Send OTP</button>
      <div id="sendError" class="error-msg"></div>
      <p style="margin-top:16px;font-size:13px;color:var(--text3)">Enter any 10-digit number • OTP: 123456</p>
    </div>
    <div id="otpStep" class="hidden">
      <p style="margin-bottom:8px;color:var(--text2)" id="otpSentText"></p>
      <div class="otp-inputs">
        <input type="text" maxlength="1" oninput="otpNext(this,0)" id="otp0">
        <input type="text" maxlength="1" oninput="otpNext(this,1)" id="otp1">
        <input type="text" maxlength="1" oninput="otpNext(this,2)" id="otp2">
        <input type="text" maxlength="1" oninput="otpNext(this,3)" id="otp3">
        <input type="text" maxlength="1" oninput="otpNext(this,4)" id="otp4">
        <input type="text" maxlength="1" oninput="otpNext(this,5)" id="otp5">
      </div>
      <button class="btn btn-primary" id="verifyBtn" onclick="verifyOtp()">Verify & Login</button>
      <div id="verifyError" class="error-msg"></div>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="container hidden">
  <div class="dashboard-grid">
    <div class="stat-card">
      <div class="stat-value" id="todayEarnings">₹0</div>
      <div class="stat-label">Today's Earnings</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--primary)" id="todayRides">0</div>
      <div class="stat-label">Rides Today</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--blue)" id="driverRating">5.0</div>
      <div class="stat-label">Rating</div>
    </div>
  </div>

  <div class="toggle-section">
    <button id="toggleBtn" class="toggle-btn toggle-offline" onclick="toggleOnline()">⚡ Go Online</button>
    <div id="toggleError" class="error-msg"></div>
    <p class="waiting-text hidden" id="waitingText">Waiting for ride requests...</p>
  </div>

  <div id="rideRequest" class="hidden"></div>
  <div id="activeRide" class="hidden"></div>

  <div class="log-section">
    <h3>📋 Activity Log</h3>
    <div id="logEntries"></div>
  </div>
</div>

<script>
const API = window.location.origin + '/api/v1';
let token = '';
let driverData = null;
let isOnline = false;
let currentRideId = null;
let rideRequestTimer = null;
let pollInterval = null;
let sessionRides = 0;
let sessionEarnings = 0;

function addLog(msg, type = '') {
  const time = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const el = document.createElement('div');
  el.className = 'log-entry ' + type;
  el.textContent = '[' + time + '] ' + msg;
  const c = document.getElementById('logEntries');
  c.insertBefore(el, c.firstChild);
  if (c.children.length > 30) c.removeChild(c.lastChild);
}

function showError(elId, msg) {
  const el = document.getElementById(elId);
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}

async function apiCall(method, path, body) {
  try {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (token) opts.headers['Authorization'] = 'Bearer ' + token;
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API + path, opts);
    const json = await res.json();
    return json;
  } catch (err) {
    return { success: false, error: { message: 'Network error: ' + err.message } };
  }
}

// ── AUTH ──

async function sendOtp() {
  const phone = document.getElementById('phoneInput').value.trim();
  if (phone.length !== 10 || !/^\d+$/.test(phone)) { showError('sendError', 'Enter a valid 10-digit phone number'); return; }
  const btn = document.getElementById('sendOtpBtn');
  btn.disabled = true; btn.textContent = 'Sending...';
  const data = await apiCall('POST', '/auth/send-otp', { phone, role: 'DRIVER' });
  btn.disabled = false; btn.textContent = 'Send OTP';
  if (data.success) {
    document.getElementById('phoneStep').classList.add('hidden');
    document.getElementById('otpStep').classList.remove('hidden');
    const otpHint = data.data.otp ? ' (OTP: ' + data.data.otp + ')' : '';
    document.getElementById('otpSentText').textContent = 'OTP sent to +91 ' + phone + otpHint;
    document.getElementById('otp0').focus();
    addLog('OTP sent to +91 ' + phone, 'info');
  } else {
    showError('sendError', data.error?.message || 'Failed to send OTP');
    addLog('OTP failed: ' + (data.error?.message || 'Unknown'), 'error');
  }
}

function otpNext(el, idx) {
  el.value = el.value.replace(/[^0-9]/g, '');
  if (el.value && idx < 5) document.getElementById('otp' + (idx + 1)).focus();
  if (idx === 5 && el.value) verifyOtp();
}

async function verifyOtp() {
  const phone = document.getElementById('phoneInput').value.trim();
  const otp = [0,1,2,3,4,5].map(i => document.getElementById('otp'+i).value).join('');
  if (otp.length !== 6) { showError('verifyError', 'Enter all 6 digits'); return; }
  const btn = document.getElementById('verifyBtn');
  btn.disabled = true; btn.textContent = 'Verifying...';
  const data = await apiCall('POST', '/auth/verify-otp', { phone, otp, role: 'DRIVER' });
  btn.disabled = false; btn.textContent = 'Verify & Login';
  if (data.success) {
    token = data.data.tokens.accessToken;
    driverData = data.data.user;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    document.getElementById('statusBadge').classList.remove('hidden');
    addLog('Logged in as ' + (driverData.fullName || 'Driver') + ' (' + driverData.phone + ')', 'success');
    loadProfile();
  } else {
    showError('verifyError', data.error?.message || 'Invalid OTP');
    addLog('Login failed: ' + (data.error?.message || 'Unknown'), 'error');
  }
}

async function loadProfile() {
  const data = await apiCall('GET', '/driver/profile');
  if (data.success && data.data) {
    document.getElementById('driverRating').textContent = (data.data.rating || 5.0).toFixed(1);
    addLog('Profile loaded — ' + (data.data.city || 'Taliparamba'), 'info');
  }
}

// ── GO ONLINE / OFFLINE ──

async function toggleOnline() {
  const btn = document.getElementById('toggleBtn');
  btn.disabled = true;

  if (!isOnline) {
    btn.textContent = 'Going online...';
    const data = await apiCall('POST', '/driver/go-online', { lat: 12.0368, lng: 75.3614 });
    btn.disabled = false;
    if (data.success) {
      isOnline = true;
      btn.textContent = '🔴 Go Offline';
      btn.className = 'toggle-btn toggle-online';
      document.getElementById('statusBadge').className = 'status-badge status-online';
      document.getElementById('statusText').textContent = 'Online';
      document.getElementById('toggleError').style.display = 'none';
      const w = document.getElementById('waitingText');
      w.classList.remove('hidden');
      w.innerHTML = 'Waiting for ride requests... <button class="btn btn-outline btn-sm" style="display:inline;width:auto;margin-left:12px" onclick="simulateRide()">🧪 Simulate Ride</button>';
      addLog('You are now ONLINE — accepting rides in Taliparamba', 'success');
      startLocationPolling();
    } else {
      btn.textContent = '⚡ Go Online';
      showError('toggleError', data.error?.message || 'Failed to go online');
      addLog('Go online failed: ' + (data.error?.message || 'Unknown'), 'error');
    }
  } else {
    btn.textContent = 'Going offline...';
    await apiCall('POST', '/driver/go-offline');
    btn.disabled = false;
    isOnline = false;
    btn.textContent = '⚡ Go Online';
    btn.className = 'toggle-btn toggle-offline';
    document.getElementById('statusBadge').className = 'status-badge status-offline';
    document.getElementById('statusText').textContent = 'Offline';
    document.getElementById('waitingText').classList.add('hidden');
    addLog('You are now OFFLINE', 'warning');
    stopLocationPolling();
  }
}

function startLocationPolling() {
  pollInterval = setInterval(async () => {
    const jitter = () => (Math.random() - 0.5) * 0.004;
    await apiCall('PUT', '/driver/location', { lat: 12.0368 + jitter(), lng: 75.3614 + jitter() });
  }, 10000);
}
function stopLocationPolling() { if (pollInterval) { clearInterval(pollInterval); pollInterval = null; } }

// ── RIDE REQUEST ──

function simulateRide() {
  const fares = [45, 55, 68, 75, 85, 92, 110, 125];
  const pickups = ['തളിപ്പറമ്പ് ബസ് സ്റ്റാൻഡ്', 'മണ്ണ ജംഗ്ഷൻ', 'Govt Hospital Taliparamba'];
  const drops = ['കണ്ണപുരം റെയിൽവേ സ്റ്റേഷൻ', 'പറശ്ശിനിക്കടവ് ക്ഷേത്രം', 'തൃച്ചംബരം ക്ഷേത്രം', 'കുറ്റിയേരി തൂക്കുപാലം'];
  const fare = fares[Math.floor(Math.random() * fares.length)];
  const dist = (1 + Math.random() * 8).toFixed(1);
  showRideRequest({
    pickupAddress: pickups[Math.floor(Math.random() * pickups.length)],
    dropoffAddress: drops[Math.floor(Math.random() * drops.length)],
    estimatedFare: fare,
    estimatedDistanceKm: parseFloat(dist),
    estimatedDurationMin: Math.ceil(dist * 3),
    riderRating: (4.2 + Math.random() * 0.8).toFixed(1),
  });
}

function showRideRequest(ride) {
  currentRideId = ride.id || 'demo-' + Date.now();
  let countdown = 30;
  const container = document.getElementById('rideRequest');

  function render() {
    container.innerHTML =
      '<div class="ride-request">' +
        '<div class="request-header"><span class="request-title">🔔 New Ride Request!</span><span class="request-timer">' + countdown + 's</span></div>' +
        '<div class="request-fare">₹' + Math.round(ride.estimatedFare) + '</div>' +
        '<div class="request-meta"><span>📏 ' + ride.estimatedDistanceKm + ' km</span><span>⏱️ ' + ride.estimatedDurationMin + ' min</span><span>⭐ ' + ride.riderRating + '</span></div>' +
        '<div class="route-section">' +
          '<div class="route-point"><div class="route-dot" style="background:var(--green)"></div><div><div class="route-label">PICKUP</div><div class="route-addr">' + ride.pickupAddress + '</div></div></div>' +
          '<div class="route-line" style="margin-left:4px"></div>' +
          '<div class="route-point"><div class="route-dot" style="background:var(--red)"></div><div><div class="route-label">DROP-OFF</div><div class="route-addr">' + ride.dropoffAddress + '</div></div></div>' +
        '</div>' +
        '<div class="request-actions"><button class="btn btn-outline" onclick="declineRide()">Decline</button><button class="btn btn-green" onclick="acceptRide(' + ride.estimatedFare + ',\'' + ride.dropoffAddress.replace(/'/g, "\\'") + '\')">✓ Accept Ride</button></div>' +
      '</div>';
    container.classList.remove('hidden');
  }
  render();
  addLog('🔔 New ride request: ₹' + ride.estimatedFare + ' — ' + ride.pickupAddress, 'warning');

  rideRequestTimer = setInterval(() => {
    countdown--;
    if (countdown <= 0) { clearInterval(rideRequestTimer); declineRide(); return; }
    const t = container.querySelector('.request-timer');
    if (t) t.textContent = countdown + 's';
  }, 1000);
}

function declineRide() {
  clearInterval(rideRequestTimer);
  document.getElementById('rideRequest').classList.add('hidden');
  currentRideId = null;
  addLog('Ride request declined', 'warning');
}

function acceptRide(fare, dropAddr) {
  clearInterval(rideRequestTimer);
  document.getElementById('rideRequest').classList.add('hidden');
  document.getElementById('waitingText').classList.add('hidden');
  addLog('Ride ACCEPTED — heading to pickup', 'success');
  showPhase('heading_to_pickup', fare, dropAddr);
}

function showPhase(phase, fare, dropAddr) {
  fare = fare || 85;
  dropAddr = dropAddr || 'കണ്ണപുരം റെയിൽവേ സ്റ്റേഷൻ';
  const c = document.getElementById('activeRide');
  c.classList.remove('hidden');

  if (phase === 'heading_to_pickup') {
    c.innerHTML =
      '<div class="ride-phase">' +
        '<div class="phase-title">📍 Heading to Pickup</div>' +
        '<div class="phase-sub">Navigate to rider\'s location</div>' +
        '<div class="rider-card"><div class="rider-avatar">👤</div><div style="flex:1"><div class="rider-name">Rider</div><div class="rider-rating">⭐ 4.8</div></div><button class="btn btn-outline btn-sm" onclick="alert(\'Calling rider...\')">📞 Call</button></div>' +
        '<button class="btn btn-primary" onclick="showPhase(\'arrived\',' + fare + ',\'' + dropAddr.replace(/'/g, "\\'") + '\')">✓ I\'ve Arrived at Pickup</button>' +
      '</div>';
  } else if (phase === 'arrived') {
    addLog('Arrived at pickup — enter OTP to start', 'info');
    c.innerHTML =
      '<div class="ride-phase">' +
        '<div class="phase-title">🏁 Arrived at Pickup</div>' +
        '<div class="phase-sub">Ask rider for their OTP to start the ride</div>' +
        '<div class="rider-card"><div class="rider-avatar">👤</div><div style="flex:1"><div class="rider-name">Rider</div><div class="rider-rating">⭐ 4.8</div></div></div>' +
        '<div class="otp-display"><div class="label">Rider\'s OTP (demo)</div><div class="code">4 5 6 7</div></div>' +
        '<div class="otp-verify"><input type="text" id="rideOtpInput" placeholder="Enter 4-digit OTP" maxlength="4"></div>' +
        '<button class="btn btn-green" onclick="startRide(' + fare + ',\'' + dropAddr.replace(/'/g, "\\'") + '\')">▶ Start Ride</button>' +
      '</div>';
  } else if (phase === 'on_trip') {
    addLog('🚗 Ride STARTED — heading to ' + dropAddr, 'success');
    c.innerHTML =
      '<div class="ride-phase">' +
        '<div class="phase-title">🚗 Trip in Progress</div>' +
        '<div class="phase-sub">Heading to drop-off</div>' +
        '<div class="route-section"><div class="route-point"><div class="route-dot" style="background:var(--red)"></div><div><div class="route-label">DROP-OFF</div><div class="route-addr">' + dropAddr + '</div></div></div></div>' +
        '<div style="display:flex;justify-content:space-between;margin-bottom:16px;padding:8px 0"><span style="color:var(--text2)">Estimated Fare</span><span style="font-size:20px;font-weight:700;color:var(--primary)">₹' + fare + '</span></div>' +
        '<button class="btn btn-green" onclick="completeRide(' + fare + ')">✓ Complete Ride</button>' +
      '</div>';
  } else if (phase === 'completed') {
    sessionRides++;
    sessionEarnings += fare;
    addLog('✅ Ride COMPLETED — ₹' + fare + ' earned!', 'success');
    c.innerHTML =
      '<div class="ride-phase"><div class="completed-card">' +
        '<div style="font-size:56px;margin-bottom:12px">✅</div>' +
        '<div class="phase-title">Ride Completed!</div>' +
        '<div class="completed-fare">₹' + fare + '</div>' +
        '<div class="completed-label">Fare Collected (Cash)</div>' +
        '<button class="btn btn-primary" style="margin-top:16px" onclick="backToIdle()">Done — Back to Waiting</button>' +
      '</div></div>';
    document.getElementById('todayRides').textContent = sessionRides;
    document.getElementById('todayEarnings').textContent = '₹' + sessionEarnings;
  }
}

function startRide(fare, dropAddr) {
  const otp = document.getElementById('rideOtpInput').value;
  if (otp.length < 4) { alert('Enter the 4-digit OTP from the rider'); return; }
  showPhase('on_trip', fare, dropAddr);
}

function completeRide(fare) { showPhase('completed', fare); }

function backToIdle() {
  const c = document.getElementById('activeRide');
  c.classList.add('hidden');
  c.innerHTML = '';
  currentRideId = null;
  if (isOnline) {
    const w = document.getElementById('waitingText');
    w.classList.remove('hidden');
    w.innerHTML = 'Waiting for ride requests... <button class="btn btn-outline btn-sm" style="display:inline;width:auto;margin-left:12px" onclick="simulateRide()">🧪 Simulate Ride</button>';
  }
  addLog('Ready for next ride', 'info');
}
</script>
</body>
</html>
